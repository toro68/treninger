<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#FFD700"/></marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#333"/></marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" fill="#3a8c3a" rx="8"/>
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">7v2 Kvadrat-Rondo (10×10 yards)</text>
  <!-- Pitch square -->
  <rect x="100" y="55" width="300" height="300" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Outside players (blue) - 2 on 3 sides, 1 on fourth side -->
  <!-- Top side (2 players) -->
  <circle cx="200" cy="55" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="200" y="60" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">1</text>
  <circle cx="300" cy="55" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="300" y="60" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">2</text>
  <!-- Right side (2 players) -->
  <circle cx="400" cy="155" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">3</text>
  <circle cx="400" cy="255" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">4</text>
  <!-- Bottom side (2 players) -->
  <circle cx="200" cy="355" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="200" y="360" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">5</text>
  <circle cx="300" cy="355" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="300" y="360" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">6</text>
  <!-- Left side (1 player) -->
  <circle cx="100" cy="205" r="14" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="100" y="210" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">7</text>
  <!-- Inside defenders (yellow) -->
  <circle cx="220" cy="180" r="14" fill="#FFC107" stroke="white" stroke-width="2"/>
  <text x="220" y="185" text-anchor="middle" fill="black" font-family="Arial" font-size="11" font-weight="bold">D1</text>
  <circle cx="290" cy="240" r="14" fill="#FFC107" stroke="white" stroke-width="2"/>
  <text x="290" y="245" text-anchor="middle" fill="black" font-family="Arial" font-size="11" font-weight="bold">D2</text>
  <!-- Pass arrows -->
  <line x1="214" y1="55" x2="286" y2="55" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="308" y1="67" x2="388" y2="143" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="400" y1="169" x2="400" y2="241" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="388" y1="263" x2="310" y2="345" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <!-- Movement arrows for defenders -->
  <path d="M230,175 Q250,160 255,185" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dash)"/>
  <path d="M280,245 Q260,260 265,230" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dash)"/>
  <!-- Legend -->
  <rect x="20" y="380" width="160" height="105" fill="rgba(0,0,0,0.5)" rx="5"/>
  <circle cx="40" cy="400" r="8" fill="#2196F3" stroke="white" stroke-width="1"/>
  <text x="55" y="404" fill="white" font-family="Arial" font-size="10">Besittelse (7)</text>
  <circle cx="40" cy="422" r="8" fill="#FFC107" stroke="white" stroke-width="1"/>
  <text x="55" y="426" fill="white" font-family="Arial" font-size="10">Forsvarere (2)</text>
  <line x1="32" y1="445" x2="60" y2="445" stroke="#FFD700" stroke-width="2"/>
  <text x="65" y="449" fill="white" font-family="Arial" font-size="10">Pasning</text>
  <text x="30" y="472" fill="white" font-family="Arial" font-size="9">Maks 1 touch. Mister = bytt</text>
  <!-- Dimensions -->
  <text x="250" y="490" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="10">10 × 10 yards — 2 spillere på 3 sider, 1 på fjerde</text>
</svg>