<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#FFD700"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#90CAF9"/></marker>
  </defs>
  <rect width="560" height="440" fill="#3a8c3a" rx="8"/>
  <text x="280" y="26" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Pasningskombinasjon med dobbel vegg og distanseskudd</text>
  <!-- Half pitch -->
  <rect x="30" y="40" width="500" height="360" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Goal -->
  <rect x="230" y="40" width="100" height="6" fill="white" rx="2"/>
  <!-- Penalty area -->
  <rect x="130" y="40" width="300" height="100" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Mannequin/cones -->
  <rect x="195" y="175" width="8" height="24" fill="#E53935" rx="2"/>
  <rect x="355" y="175" width="8" height="24" fill="#E53935" rx="2"/>
  <rect x="275" y="130" width="8" height="24" fill="#E53935" rx="2"/>
  <!-- Players -->
  <!-- A (bottom center) -->
  <circle cx="280" cy="370" r="16" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="280" y="375" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">A</text>
  <!-- Coach/Trener (white) -->
  <circle cx="280" cy="290" r="14" fill="white" stroke="#999" stroke-width="2"/>
  <text x="280" y="295" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold">T</text>
  <!-- B -->
  <circle cx="180" cy="250" r="16" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="180" y="255" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">B</text>
  <!-- C -->
  <circle cx="380" cy="210" r="16" fill="#2196F3" stroke="white" stroke-width="2"/>
  <text x="380" y="215" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">C</text>
  <!-- GK -->
  <circle cx="280" cy="60" r="12" fill="#4CAF50" stroke="white" stroke-width="2"/>
  <text x="280" y="64" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">MV</text>
  <!-- Pass sequence -->
  <!-- 1: A → T -->
  <line x1="280" y1="354" x2="280" y2="306" stroke="#FFD700" stroke-width="2.5" marker-end="url(#a1)"/>
  <circle cx="280" cy="330" r="10" fill="rgba(0,0,0,0.5)"/><text x="280" y="334" text-anchor="middle" fill="white" font-family="Arial" font-size="9">1</text>
  <!-- 2: T → A (1-2) -->
  <line x1="274" y1="290" x2="274" y2="356" stroke="#90CAF9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a2)"/>
  <circle cx="268" cy="330" r="10" fill="rgba(0,0,0,0.5)"/><text x="268" y="334" text-anchor="middle" fill="white" font-family="Arial" font-size="9">2</text>
  <!-- 3: A → C -->
  <line x1="296" y1="365" x2="366" y2="218" stroke="#FFD700" stroke-width="2.5" marker-end="url(#a1)"/>
  <circle cx="335" cy="290" r="10" fill="rgba(0,0,0,0.5)"/><text x="335" y="294" text-anchor="middle" fill="white" font-family="Arial" font-size="9">3</text>
  <!-- 4: C → B diagonal -->
  <line x1="366" y1="216" x2="196" y2="254" stroke="#FFD700" stroke-width="2.5" marker-end="url(#a1)"/>
  <circle cx="280" cy="238" r="10" fill="rgba(0,0,0,0.5)"/><text x="280" y="242" text-anchor="middle" fill="white" font-family="Arial" font-size="9">4</text>
  <!-- 5: B → C (høyre for mannekeng) -->
  <line x1="194" y1="244" x2="367" y2="204" stroke="#FFD700" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#a1)"/>
  <circle cx="280" cy="218" r="10" fill="rgba(0,0,0,0.5)"/><text x="280" y="222" text-anchor="middle" fill="white" font-family="Arial" font-size="9">5</text>
  <!-- 6: C → B (siste pasning) -->
  <line x1="372" y1="200" x2="202" y2="188" stroke="#FFD700" stroke-width="2.5" marker-end="url(#a1)"/>
  <circle cx="288" cy="190" r="10" fill="rgba(0,0,0,0.5)"/><text x="288" y="194" text-anchor="middle" fill="white" font-family="Arial" font-size="9">6</text>
  <!-- 7: B shoots -->
  <line x1="180" y1="234" x2="260" y2="72" stroke="#F44336" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#a1)"/>
  <circle cx="215" cy="150" r="10" fill="rgba(0,0,0,0.5)"/><text x="215" y="154" text-anchor="middle" fill="white" font-family="Arial" font-size="9">7</text>
  <!-- B movement arrow -->
  <path d="M180,234 Q175,210 185,195" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Legend -->
  <rect x="405" y="290" width="140" height="105" fill="rgba(0,0,0,0.5)" rx="5"/>
  <text x="475" y="308" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Rotasjon: A→B→C→A</text>
  <line x1="415" y1="325" x2="440" y2="325" stroke="#FFD700" stroke-width="2"/>
  <text x="445" y="329" fill="white" font-family="Arial" font-size="9">Pasning</text>
  <line x1="415" y1="345" x2="440" y2="345" stroke="#90CAF9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="445" y="349" fill="white" font-family="Arial" font-size="9">Returpasning (1-2)</text>
  <line x1="415" y1="365" x2="440" y2="365" stroke="#F44336" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="445" y="369" fill="white" font-family="Arial" font-size="9">Skudd</text>
  <rect x="415" y="378" width="8" height="12" fill="#E53935" rx="1"/>
  <text x="430" y="388" fill="white" font-family="Arial" font-size="9">Mannekeng</text>
</svg>